<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Kanban</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a18" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Theme variables (light) ─────────────────────────────────────────── */
    :root {
      --bg:            #f5f4f0;
      --text:          #1a1a18;
      --text-2:        #5f5e5a;
      --text-3:        #888780;
      --text-4:        #bbb9b4;
      --surface:       #ffffff;
      --surface-2:     #fafafa;
      --col-bg:        #eeece6;
      --border:        rgba(0,0,0,0.1);
      --border-2:      rgba(0,0,0,0.15);
      --border-3:      rgba(0,0,0,0.2);
      --border-focus:  rgba(0,0,0,0.35);
      --border-sep:    rgba(0,0,0,0.08);
      --border-dash:   rgba(0,0,0,0.15);
      --hover:         rgba(0,0,0,0.04);
      --hover-sm:      rgba(0,0,0,0.03);
      --hover-2:       rgba(0,0,0,0.06);
      --shadow:        rgba(0,0,0,0.1);
      --modal-shadow:  rgba(0,0,0,0.18);
      --btn-bg:        #1a1a18;
      --btn-text:      #f5f4f0;
      --dot-selected:  rgba(0,0,0,0.4);
      --dot-inner:     #fff;
      --placeholder:   #b8b7b2;
      --drag-outline:  rgba(0,0,0,0.2);
      --card-shadow:   none;
      --col-todo-bg:        #fae8e8;
      --col-todo-border:    rgba(180,60,60,0.15);
      --col-ip-bg:          #faf6e0;
      --col-ip-border:      rgba(160,130,0,0.15);
      --col-done-bg:        #e8f4ea;
      --col-done-border:    rgba(40,130,60,0.15);
    }

    /* ─── Dark theme variables ─────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:            #16161a;
        --text:          #e8e8e4;
        --text-2:        #b0afa8;
        --text-3:        #9e9d96;
        --text-4:        #555550;
        --surface:       #3e3e3c;
        --surface-2:     #323230;
        --col-bg:        #1e1e1c;
        --border:        rgba(255,255,255,0.14);
        --border-2:      rgba(255,255,255,0.18);
        --border-3:      rgba(255,255,255,0.22);
        --border-focus:  rgba(255,255,255,0.45);
        --border-sep:    rgba(255,255,255,0.08);
        --border-dash:   rgba(255,255,255,0.15);
        --hover:         rgba(255,255,255,0.05);
        --hover-sm:      rgba(255,255,255,0.04);
        --hover-2:       rgba(255,255,255,0.08);
        --shadow:        rgba(0,0,0,0.5);
        --modal-shadow:  rgba(0,0,0,0.7);
        --card-shadow:   0 1px 4px rgba(0,0,0,0.5);
        --btn-bg:        #e8e8e4;
        --btn-text:      #1a1a18;
        --dot-selected:  rgba(255,255,255,0.5);
        --dot-inner:     #323230;
        --placeholder:   #555550;
        --drag-outline:  rgba(255,255,255,0.2);
        --col-todo-bg:        #2a1c1c;
        --col-todo-border:    rgba(180,60,60,0.3);
        --col-ip-bg:          #272510;
        --col-ip-border:      rgba(160,130,0,0.3);
        --col-done-bg:        #162218;
        --col-done-border:    rgba(40,130,60,0.3);
      }
    }

    html[data-theme="dark"] {
      --bg:            #16161a;
      --text:          #e8e8e4;
      --text-2:        #b0afa8;
      --text-3:        #9e9d96;
      --text-4:        #555550;
      --surface:       #323230;
      --surface-2:     #272725;
      --col-bg:        #1e1e1c;
      --border:        rgba(255,255,255,0.14);
      --border-2:      rgba(255,255,255,0.18);
      --border-3:      rgba(255,255,255,0.22);
      --border-focus:  rgba(255,255,255,0.45);
      --border-sep:    rgba(255,255,255,0.08);
      --border-dash:   rgba(255,255,255,0.15);
      --hover:         rgba(255,255,255,0.05);
      --hover-sm:      rgba(255,255,255,0.04);
      --hover-2:       rgba(255,255,255,0.08);
      --shadow:        rgba(0,0,0,0.5);
      --modal-shadow:  rgba(0,0,0,0.7);
      --card-shadow:   0 1px 4px rgba(0,0,0,0.5);
      --btn-bg:        #e8e8e4;
      --btn-text:      #1a1a18;
      --dot-selected:  rgba(255,255,255,0.5);
      --dot-inner:     #323230;
      --placeholder:   #555550;
      --drag-outline:  rgba(255,255,255,0.2);
      --col-todo-bg:        #2a1c1c;
      --col-todo-border:    rgba(180,60,60,0.3);
      --col-ip-bg:          #272510;
      --col-ip-border:      rgba(160,130,0,0.3);
      --col-done-bg:        #162218;
      --col-done-border:    rgba(40,130,60,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 { font-size: 18px; font-weight: 500; color: var(--text); }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-3);
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c8c7c2;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #status-dot.connecting { background: #d4a017; }
    #status-dot.saving     { background: #5b8dd9; }
    #status-dot.saved      { background: #5fa85a; }
    #status-dot.error      { background: #c0392b; }

    #refresh-btn, #theme-btn {
      background: none;
      border: 0.5px solid var(--border-2);
      cursor: pointer;
      color: var(--text-3);
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    #refresh-btn:hover, #theme-btn:hover { background: var(--hover); color: var(--text-2); }

    .board {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    @media (max-width: 600px) {
      .board { flex-direction: column; }
    }

    .column {
      flex: 1;
      background: var(--col-bg);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 12px;
      min-height: 400px;
    }

    .column-todo       { background: var(--col-todo-bg);  border-color: var(--col-todo-border); }
    .column-inprogress { background: var(--col-ip-bg);    border-color: var(--col-ip-border); }
    .column-done       { background: var(--col-done-bg);  border-color: var(--col-done-border); }

    .column.drag-over { outline: 1.5px dashed var(--drag-outline); }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 0.5px solid var(--border);
    }

    .column-title {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-2);
    }

    .column-count {
      font-size: 12px;
      color: var(--text-3);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 1px 8px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: box-shadow 0.15s, opacity 0.1s;
      position: relative;
      user-select: none;
      box-shadow: var(--card-shadow);
    }

    .card:hover { box-shadow: 0 2px 8px var(--shadow); }
    .card.dragging { opacity: 0.4; cursor: grabbing; }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      padding-right: 20px;
    }

    .card-body {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.4;
      margin-top: 4px;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 11px;
      padding: 2px 5px 2px 7px;
      border-radius: 20px;
    }

    .card-tag-remove {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      color: inherit;
      opacity: 0.5;
      transition: opacity 0.1s;
    }

    .card-tag-remove:hover { opacity: 1; }
    .card:hover .card-tag-remove { display: inline; }

    .tag-blue   { background: #E6F1FB; color: #0C447C; }
    .tag-green  { background: #EAF3DE; color: #3B6D11; }
    .tag-amber  { background: #FAEEDA; color: #854F0B; }
    .tag-rose   { background: #FAE6EA; color: #7C1215; }
    .tag-purple { background: #EDE6FB; color: #3D1C7C; }

    .card-delete {
      position: absolute;
      top: 5px; right: 6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-4);
      font-size: 15px;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.1s;
    }

    .card:hover .card-delete { display: flex; }
    .card-delete:hover { color: #c0392b; }

    .add-card-btn {
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-3);
      background: transparent;
      border: 0.5px dashed var(--border-dash);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: color 0.1s, background 0.1s;
    }

    .add-card-btn:hover { color: var(--text-2); background: var(--hover-sm); }

    /* ─── Label picker ────────────────────────────────────────────────────────── */
    .label-picker { position: relative; }

    .label-trigger {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: inherit;
      border-radius: 20px;
      border: 0.5px dashed var(--border-3);
      background: none;
      cursor: pointer;
      color: var(--text-3);
      transition: background 0.1s, color 0.1s;
    }

    .label-trigger:hover { background: var(--hover); color: var(--text-2); }

    button.card-tag { cursor: pointer; }

    .label-panel {
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      z-index: 300;
      background: var(--surface);
      border: 0.5px solid var(--border-2);
      border-radius: 10px;
      box-shadow: 0 4px 16px var(--shadow);
      padding: 6px;
      min-width: 190px;
      display: none;
      flex-direction: column;
      gap: 2px;
    }

    .label-panel.open { display: flex; }

    .label-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      background: none;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      width: 100%;
      color: var(--text);
      transition: background 0.1s;
    }

    .label-option:hover { background: var(--hover); }
    .label-option.selected { background: var(--hover-2); font-weight: 500; }

    .label-option-swatch {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 0.5px solid var(--border);
    }

    .label-sep { height: 0.5px; background: var(--border-sep); margin: 4px 2px; }

    .label-new-section {
      padding: 4px 4px 2px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .label-new-section input {
      width: 100%;
      border: 0.5px solid var(--border-3);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-2);
      outline: none;
    }

    .label-new-section input:focus { border-color: var(--border-focus); background: var(--surface); }
    .label-new-section input::placeholder { color: var(--placeholder); }

    .label-color-row { display: flex; gap: 6px; }

    .label-color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: transform 0.1s;
      outline: none;
    }

    .label-color-dot:hover { transform: scale(1.15); }
    .label-color-dot.selected { border-color: var(--dot-selected); box-shadow: inset 0 0 0 2px var(--dot-inner); }

    /* ─── Buttons ─────────────────────────────────────────────────────────────── */
    .btn-primary {
      padding: 6px 14px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.1s;
    }

    .btn-primary:hover { opacity: 0.8; }

    .btn-cancel {
      padding: 6px 10px;
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      font-family: inherit;
      transition: color 0.1s;
    }

    .btn-cancel:hover { color: var(--text-2); }

    .btn-danger {
      padding: 6px 10px;
      background: none;
      border: 0.5px solid rgba(192,57,43,0.35);
      color: #c0392b;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn-danger:hover { background: rgba(192,57,43,0.08); }

    /* ─── Card modal ──────────────────────────────────────────────────────────── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-backdrop.open { display: flex; }

    #card-modal {
      background: var(--surface);
      border: 0.5px solid var(--border-2);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px var(--modal-shadow);
      display: flex;
      flex-direction: column;
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 0.5px solid var(--border-sep);
    }

    #modal-col-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }

    #modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-4);
      line-height: 1;
      padding: 0;
      transition: color 0.1s, background 0.1s;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }

    #modal-close:hover { color: var(--text); background: var(--hover); }

    #modal-body-wrap {
      padding: 16px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #modal-title {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border-3);
      border-radius: 0;
      padding: 4px 0 8px;
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      outline: none;
    }

    #modal-title::placeholder { color: var(--placeholder); }
    #modal-title:focus { border-bottom-color: var(--border-focus); }

    #modal-textarea {
      width: 100%;
      resize: vertical;
      border: 0.5px solid var(--border-3);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-2);
      outline: none;
      min-height: 80px;
      line-height: 1.5;
    }

    #modal-textarea::placeholder { color: var(--placeholder); }
    #modal-textarea:focus { border-color: var(--border-focus); background: var(--surface); }

    #modal-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px 14px;
      border-top: 0.5px solid var(--border-sep);
    }

    #modal-spacer { flex: 1; }
  </style>
</head>
<body>

<header>
  <h1>Shared Kanban</h1>
  <div id="status">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">Connecting…</span>
    <button id="theme-btn" title="Toggle dark mode">☾</button>
    <button id="refresh-btn" title="Reload from server">↻ Sync</button>
  </div>
</header>

<div class="board" id="board"></div>

<!-- ─── Card modal ──────────────────────────────────────────────────────────── -->
<div id="modal-backdrop">
  <div id="card-modal">
    <div id="modal-header">
      <span id="modal-col-label"></span>
      <button id="modal-close" title="Close">×</button>
    </div>
    <div id="modal-body-wrap">
      <input type="text" id="modal-title" placeholder="Title…" autocomplete="off">
      <textarea id="modal-textarea" rows="4" placeholder="Details (optional)…"></textarea>
      <div class="label-picker" id="modal-label-picker"></div>
    </div>
    <div id="modal-footer">
      <button id="modal-delete" class="btn-danger">Delete</button>
      <div id="modal-spacer"></div>
      <button id="modal-cancel" class="btn-cancel">Cancel</button>
      <button id="modal-save" class="btn-primary">Add card</button>
    </div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API     = 'https://api.jsonbin.io/v3';
const POLL_MS = 15_000;

const COLUMNS = [
  { id: 'todo',       label: 'To Do'       },
  { id: 'inprogress', label: 'In Progress' },
  { id: 'done',       label: 'Done'        },
];

const COLORS = [
  { cls: 'tag-blue',   dot: '#7ab3e0' },
  { cls: 'tag-green',  dot: '#8abb6a' },
  { cls: 'tag-amber',  dot: '#d4964a' },
  { cls: 'tag-rose',   dot: '#d47a8a' },
  { cls: 'tag-purple', dot: '#9a7ad4' },
];

// ─── Config from URL / localStorage ──────────────────────────────────────────
// URL format:  #MASTERKEY/BINID   (hash is never sent to server — key stays private)
let MASTER_KEY = null;
let binId      = null;

(function parseConfig() {
  const raw = location.hash.slice(1) || localStorage.getItem('kanban-config')
                                     || localStorage.getItem('kanban-bin-id');
  if (!raw) return;
  const slash = raw.lastIndexOf('/');
  if (slash !== -1) {
    MASTER_KEY = raw.slice(0, slash) || null;
    binId      = raw.slice(slash + 1) || null;
  } else {
    binId = raw;
  }
})();

function saveConfig() {
  const cfg = MASTER_KEY ? `${MASTER_KEY}/${binId || ''}` : (binId || '');
  history.replaceState(null, '', '#' + cfg);
  localStorage.setItem('kanban-config', cfg);
}

// ─── State ────────────────────────────────────────────────────────────────────
let state       = { todo: [], inprogress: [], done: [] };
let saveTimer   = null;
let pollTimer   = null;
let isSaving    = false;
let dragSrc     = null;
let modalState  = null;   // { mode: 'create'|'edit', colId, card? }
let modalPicker = null;

// ─── Status ───────────────────────────────────────────────────────────────────
function setStatus(kind, msg) {
  document.getElementById('status-dot').className    = kind;
  document.getElementById('status-text').textContent = msg;
}

// ─── JSONBin API ──────────────────────────────────────────────────────────────
const headers = () => ({ 'X-Master-Key': MASTER_KEY });

async function createBin() {
  const res = await fetch(`${API}/b`, {
    method: 'POST',
    headers: { ...headers(), 'Content-Type': 'application/json', 'X-Bin-Name': 'kanban-shared', 'X-Bin-Private': 'false' },
    body: JSON.stringify({ todo: [], inprogress: [], done: [] }),
  });
  if (!res.ok) throw new Error(`Create bin failed: ${res.status}`);
  const { metadata } = await res.json();
  return metadata.id;
}

async function fetchState() {
  const res = await fetch(`${API}/b/${binId}/latest`, { headers: headers() });
  if (res.status === 404) throw Object.assign(new Error('Bin not found'), { notFound: true });
  if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
  const { record } = await res.json();
  return record;
}

async function pushState() {
  const res = await fetch(`${API}/b/${binId}`, {
    method: 'PUT',
    headers: { ...headers(), 'Content-Type': 'application/json' },
    body: JSON.stringify(state),
  });
  if (!res.ok) throw new Error(`Save failed: ${res.status}`);
}

// ─── Debounced save ───────────────────────────────────────────────────────────
function scheduleSave() {
  setStatus('saving', 'Saving…');
  clearTimeout(saveTimer);
  clearTimeout(pollTimer);
  saveTimer = setTimeout(async () => {
    isSaving = true;
    try {
      await pushState();
      setStatus('saved', 'Saved');
    } catch (e) {
      setStatus('error', 'Save failed');
      console.error(e);
    } finally {
      isSaving = false;
      schedulePoll();
    }
  }, 700);
}

// ─── Polling ──────────────────────────────────────────────────────────────────
function schedulePoll() {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(async () => {
    if (isSaving || saveTimer) return;
    try {
      const remote = await fetchState();
      state = remote;
      renderBoard();
      setStatus('saved', 'Synced');
    } catch (_) {}
    schedulePoll();
  }, POLL_MS);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (const col of COLUMNS) {
    const cards = state[col.id] || [];
    const el = document.createElement('div');
    el.className = `column column-${col.id}`;

    el.innerHTML = `
      <div class="column-header">
        <span class="column-title">${col.label}</span>
        <span class="column-count">${cards.length}</span>
      </div>
      <div class="cards" data-col="${col.id}"></div>
      <button class="add-card-btn" data-col="${col.id}">+ Add card</button>
    `;

    board.appendChild(el);

    const zone = el.querySelector('.cards');
    for (const card of cards) zone.appendChild(buildCard(card, col.id));
    wireDropZone(zone);

    el.querySelector('.add-card-btn').addEventListener('click', () =>
      openModal({ mode: 'create', colId: col.id })
    );
  }
}

function buildCard(card, colId) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id  = card.id;
  div.dataset.col = colId;

  const displayTitle = card.title || card.text || '';
  const displayBody  = card.body  || '';
  div.innerHTML = `
    <span class="card-title">${esc(displayTitle)}</span>
    ${displayBody ? `<p class="card-body">${esc(displayBody).replace(/\n/g, '<br>')}</p>` : ''}
    ${card.tag ? `<span class="card-tag ${card.tagClass}">${esc(card.tag)}<button class="card-tag-remove" title="Remove label">×</button></span>` : ''}
    <button class="card-delete" title="Delete">×</button>
  `;

  // Click card → open in edit mode (unless clicking delete or tag-remove)
  div.addEventListener('click', e => {
    if (e.target.closest('.card-delete, .card-tag-remove')) return;
    openModal({ mode: 'edit', colId, card });
  });

  const tagRemove = div.querySelector('.card-tag-remove');
  if (tagRemove) {
    tagRemove.addEventListener('click', e => {
      e.stopPropagation();
      const idx = state[colId].findIndex(c => c.id === card.id);
      if (idx !== -1) { state[colId][idx] = { ...card, tag: null, tagClass: null }; }
      renderBoard();
      scheduleSave();
    });
  }

  div.querySelector('.card-delete').addEventListener('click', e => {
    e.stopPropagation();
    state[colId] = state[colId].filter(c => c.id !== card.id);
    renderBoard();
    scheduleSave();
  });

  div.addEventListener('dragstart', e => {
    dragSrc = { id: card.id, col: colId };
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });

  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  });

  return div;
}

function wireDropZone(zone) {
  const col = zone.closest('.column');

  col.addEventListener('dragenter', e => {
    e.preventDefault();
    col.classList.add('drag-over');
  });

  col.addEventListener('dragleave', e => {
    if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
  });

  col.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const dragging = document.querySelector('.dragging');
    if (!dragging) return;
    const after = elementAfterCursor(zone, e.clientY);
    if (after) zone.insertBefore(dragging, after);
    else        zone.appendChild(dragging);
  });

  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (!dragSrc) return;

    const { id: cardId, col: srcCol } = dragSrc;
    const tgtCol = zone.dataset.col;
    dragSrc = null;

    const srcArr = state[srcCol];
    const idx = srcArr.findIndex(c => c.id === cardId);
    if (idx === -1) return;
    const [card] = srcArr.splice(idx, 1);

    const tgtArr  = state[tgtCol];
    const cardEls = [...zone.querySelectorAll('.card')];
    const dropEl  = zone.querySelector(`[data-id="${cardId}"]`);
    const newIdx  = dropEl ? cardEls.indexOf(dropEl) : cardEls.length;

    if (newIdx >= 0) tgtArr.splice(newIdx, 0, card);
    else             tgtArr.push(card);

    renderBoard();
    scheduleSave();
  });
}

function elementAfterCursor(container, y) {
  return [...container.querySelectorAll('.card:not(.dragging)')]
    .reduce((closest, child) => {
      const { top, height } = child.getBoundingClientRect();
      const offset = y - top - height / 2;
      return (offset < 0 && offset > closest.offset)
        ? { offset, element: child }
        : closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// ─── Card modal ───────────────────────────────────────────────────────────────
function openModal({ mode, colId, card = null }) {
  modalState = { mode, colId, card };

  const col        = COLUMNS.find(c => c.id === colId);
  const titleInput = document.getElementById('modal-title');
  const textareaEl = document.getElementById('modal-textarea');
  const deleteBtn  = document.getElementById('modal-delete');
  const saveBtn    = document.getElementById('modal-save');

  document.getElementById('modal-col-label').textContent = col.label;

  if (mode === 'create') {
    titleInput.value        = '';
    textareaEl.value        = '';
    deleteBtn.style.display = 'none';
    saveBtn.textContent     = 'Add card';
  } else {
    titleInput.value        = card.title || card.text || '';
    textareaEl.value        = card.body  || '';
    deleteBtn.style.display = '';
    saveBtn.textContent     = 'Save';
  }

  const lpEl = document.getElementById('modal-label-picker');
  lpEl.innerHTML = '';
  modalPicker = buildLabelPicker(lpEl, card?.tag ?? null, card?.tagClass ?? null);

  document.getElementById('modal-backdrop').classList.add('open');
  titleInput.focus();
  if (mode === 'edit') titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  modalState  = null;
  modalPicker = null;
}

function commitModal() {
  const title = document.getElementById('modal-title').value.trim();
  const body  = document.getElementById('modal-textarea').value.trim();
  if (!title) { document.getElementById('modal-title').focus(); return; }

  const { tag, tagClass }      = modalPicker?.getValue() ?? {};
  const { mode, colId, card }  = modalState;

  if (mode === 'create') {
    state[colId].push({
      id: crypto.randomUUID(), title, body: body || null,
      tag: tag || null, tagClass: tag ? tagClass : null,
    });
  } else {
    const idx = state[colId].findIndex(c => c.id === card.id);
    if (idx !== -1) {
      state[colId][idx] = { ...card, title, body: body || null, tag: tag || null, tagClass: tag ? tagClass : null };
    }
    // Propagate label colour change to all cards sharing this label
    if (tag && tagClass) {
      for (const col of COLUMNS) {
        state[col.id] = state[col.id].map(c =>
          c.id !== card.id && c.tag === tag ? { ...c, tagClass } : c
        );
      }
    }
  }

  closeModal();
  renderBoard();
  scheduleSave();
}

function deleteFromModal() {
  const { colId, card } = modalState;
  state[colId] = state[colId].filter(c => c.id !== card.id);
  closeModal();
  renderBoard();
  scheduleSave();
}

function initModal() {
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', commitModal);
  document.getElementById('modal-delete').addEventListener('click', deleteFromModal);

  // Click backdrop (outside modal panel) to close
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  // Keyboard shortcuts
  document.getElementById('modal-title').addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commitModal(); }
    if (e.key === 'Escape') closeModal();
  });
  document.getElementById('modal-textarea').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modalState) closeModal();
  });
}

// ─── Label picker ─────────────────────────────────────────────────────────────
function buildLabelPicker(container, initialTag, initialTagClass) {
  let selTag = initialTag || null;
  let selCls = initialTagClass || COLORS[0].cls;

  const existing = new Map();
  for (const col of COLUMNS)
    for (const c of state[col.id] || [])
      if (c.tag && !existing.has(c.tag)) existing.set(c.tag, c.tagClass);

  const colorDotsHtml = COLORS.map(c =>
    `<button type="button" class="label-color-dot${selCls === c.cls ? ' selected' : ''}" data-cls="${c.cls}" style="background:${c.dot}"></button>`
  ).join('');

  container.innerHTML = `
    <button type="button" class="label-trigger"></button>
    <div class="label-panel">
      <div class="label-options"></div>
      <div class="label-sep"></div>
      <div class="label-new-section">
        <input type="text" placeholder="New label…" maxlength="24">
        <div class="label-color-row">${colorDotsHtml}</div>
      </div>
    </div>
  `;

  const trigger   = container.querySelector('.label-trigger');
  const panel     = container.querySelector('.label-panel');
  const optionsEl = container.querySelector('.label-options');
  const newInput  = container.querySelector('.label-new-section input');
  const colorRow  = container.querySelector('.label-color-row');

  function updateTrigger() {
    if (selTag) {
      trigger.className   = `card-tag ${selCls}`;
      trigger.textContent = selTag + ' ▾';
    } else {
      trigger.className   = 'label-trigger';
      trigger.textContent = '+ Label';
    }
  }

  function buildOptions() {
    optionsEl.innerHTML = '';
    const noneBtn = document.createElement('button');
    noneBtn.type = 'button';
    noneBtn.className = 'label-option' + (!selTag ? ' selected' : '');
    noneBtn.innerHTML = `<span class="label-option-swatch" style="background:#ddd"></span>None`;
    noneBtn.addEventListener('click', () => {
      selTag = null; selCls = COLORS[0].cls;
      newInput.value = '';
      updateTrigger(); buildOptions(); dismissPanel();
    });
    optionsEl.appendChild(noneBtn);

    for (const [tag, cls] of existing) {
      const dotColor = COLORS.find(c => c.cls === cls)?.dot || '#ddd';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'label-option' + (selTag === tag ? ' selected' : '');
      btn.innerHTML = `<span class="label-option-swatch" style="background:${dotColor}"></span>${esc(tag)}`;
      btn.addEventListener('click', () => {
        selTag = tag; selCls = cls;
        newInput.value = '';
        colorRow.querySelectorAll('.label-color-dot').forEach(d =>
          d.classList.toggle('selected', d.dataset.cls === cls)
        );
        updateTrigger(); buildOptions(); dismissPanel();
      });
      optionsEl.appendChild(btn);
    }
  }

  function onOutside(e) {
    if (!container.contains(e.target)) dismissPanel();
  }

  function dismissPanel() {
    panel.classList.remove('open');
    document.removeEventListener('click', onOutside);
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.addEventListener('click', onOutside);
    } else {
      document.removeEventListener('click', onOutside);
    }
  });

  colorRow.addEventListener('click', e => {
    const dot = e.target.closest('.label-color-dot');
    if (!dot) return;
    colorRow.querySelectorAll('.label-color-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    selCls = dot.dataset.cls;
    if (selTag && !newInput.value.trim()) existing.set(selTag, selCls);
    updateTrigger();
  });

  newInput.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); dismissPanel(); }
  });
  newInput.addEventListener('input', () => {
    selTag = newInput.value.trim() || null;
    updateTrigger();
  });

  buildOptions();
  updateTrigger();

  return {
    getValue() {
      const typed = newInput.value.trim();
      return { tag: typed || selTag || null, tagClass: selCls };
    }
  };
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── Theme toggle ─────────────────────────────────────────────────────────────
(function initTheme() {
  const btn = document.getElementById('theme-btn');

  function isDark() {
    const t = document.documentElement.dataset.theme;
    if (t === 'dark')  return true;
    if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme(dark) {
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    localStorage.setItem('kanban-theme', dark ? 'dark' : 'light');
    btn.textContent = dark ? '☀' : '☾';
    btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
  }

  const stored = localStorage.getItem('kanban-theme');
  if (stored) document.documentElement.dataset.theme = stored;
  btn.textContent = isDark() ? '☀' : '☾';
  btn.title = isDark() ? 'Switch to light mode' : 'Switch to dark mode';

  btn.addEventListener('click', () => applyTheme(!isDark()));
})();

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (!MASTER_KEY) {
    setStatus('error', 'Add key to URL: #MASTERKEY/BINID');
    return;
  }

  initModal();
  setStatus('connecting', 'Connecting…');
  renderBoard();

  try {
    if (!binId) binId = await createBin();

    saveConfig();

    try {
      state = await fetchState();
    } catch (e) {
      if (e.notFound) {
        binId = await createBin();
        saveConfig();
        state = await fetchState();
      } else {
        throw e;
      }
    }

    renderBoard();
    setStatus('saved', 'Synced');
    schedulePoll();
  } catch (e) {
    setStatus('error', 'Could not connect');
    console.error(e);
  }
}

document.getElementById('refresh-btn').addEventListener('click', async () => {
  if (!binId) return;
  setStatus('connecting', 'Syncing…');
  try {
    state = await fetchState();
    renderBoard();
    setStatus('saved', 'Synced');
  } catch (e) {
    setStatus('error', 'Sync failed');
  }
});

init();

// ─── Service worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
